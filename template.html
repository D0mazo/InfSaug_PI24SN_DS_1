<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Vigenère šifravimo sistema</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Vigenère šifravimo sistema</h1>

    <div class="grid">

        <!-- KAIRĖ PUSĖ -->
        <div class="left">

            <form method="POST">

                <label>Tekstas</label>
                <textarea name="text" required><?php echo isset($text) ? htmlspecialchars($text) : ""; ?></textarea>

                <label>Raktas</label>
                <input type="text" name="key" required value="<?php echo isset($key) ? htmlspecialchars($key) : ""; ?>">

                <label>Režimas</label>
                <select name="mode">
                    <option value="basic" <?php if(isset($mode) && $mode==="basic") echo "selected"; ?>>
                    Pagrindinis (tik raidės)
                    </option>
                    <option value="ascii" <?php if(isset($mode) && $mode==="ascii") echo "selected"; ?>>
                    Išplėstinis (ASCII 32–126)
                    </option>
                </select>

                <div class="button-group">
                    <button type="submit" name="action" value="encrypt" class="btn-encrypt">
                        Užkoduoti
                    </button>

                    <button type="submit" name="action" value="decrypt" class="btn-decrypt">
                        Atkoduoti
                    </button>
                </div>

            </form>

            <?php if(!empty($error)): ?>
            <div class="error"><?php echo $error; ?></div>
            <?php endif; ?>

            <?php if(!empty($resultText)): ?>
            <div class="result">
                <h3>Rezultatas:</h3>
                <div class="box">
                    <?php echo htmlspecialchars($resultText); ?>
                </div>
            </div>
            <?php endif; ?>

        </div>

        <!-- DEŠINĖ PUSĖ -->
        <div class="right">

            <?php if(!empty($algorithmSteps)): ?>

            <h2>Algoritmo veikimo lentelė</h2>

            <table>
                <thead>
                <tr>
                    <th>Simbolis</th>
                    <th>Indeksas</th>
                    <th>Raktas</th>
                    <th>Poslinkis</th>
                    <th>Skaičiavimas</th>
                    <th>Rezultatas</th>
                </tr>
                </thead>
                <tbody>

                <?php foreach($algorithmSteps as $step): ?>
                <tr>
                    <td><?php echo htmlspecialchars($step["symbol"]); ?></td>
                    <td><?php echo $step["index"]; ?></td>
                    <td><?php echo htmlspecialchars($step["key"]); ?></td>
                    <td><?php echo $step["shift"]; ?></td>
                    <td><?php echo $step["calc"]; ?></td>
                    <td><?php echo htmlspecialchars($step["result"]); ?></td>
                </tr>
                <?php endforeach; ?>

                </tbody>
            </table>

            <?php endif; ?>

        </div>

    </div>

</div>

</body>
</html>
