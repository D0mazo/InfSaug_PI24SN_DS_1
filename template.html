<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Vigenère Šifras</title>

</head>
<body>

<div class="card">
    <h1>Vigenère šifravimo sistema</h1>

    <div class="content-layout">

        <!-- KAIRĖ PUSĖ -->
        <div class="left-side">

            <form method="post" class="form">
                <div class="form-group">
                    <label>Tekstas</label>
                    <textarea name="text" placeholder="Įveskite tekstą..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Raktas</label>
                    <input type="text" name="key" placeholder="Įveskite raktą..." required>
                </div>

                <div class="form-group">
                    <label>Režimas</label>
                    <select name="mode">
                        <option value="basic">Pagrindinis (tik raidės)</option>
                        <option value="ascii">Išplėstinis ASCII</option>
                    </select>
                </div>

                <button type="submit">Vykdyti</button>
            </form>

            <?php if (!empty($error)): ?>
            <div class="error-box">
                <?php echo $error; ?>
            </div>
            <?php endif; ?>

            <?php if (!empty($encrypted)): ?>
            <div class="results">
                <div class="result-item">
                    <strong>Užšifruotas tekstas:</strong>
                    <p><?php echo htmlspecialchars($encrypted); ?></p>
                </div>
                <div class="result-item">
                    <strong>Dešifruotas tekstas:</strong>
                    <p><?php echo htmlspecialchars($decrypted); ?></p>
                </div>
            </div>
            <?php endif; ?>

        </div>

        <!-- DEŠINĖ PUSĖ -->
        <?php if (!empty($algorithmSteps)): ?>
        <div class="right-side">
            <div class="results">
                <h3>Algoritmo veikimo lentelė</h3>
                <table class="algorithm-table">
                    <tr>
                        <th>Simbolis</th>
                        <th>Indeksas</th>
                        <th>Raktas</th>
                        <th>Poslinkis</th>
                        <th>Skaičiavimas</th>
                        <th>Rezultatas</th>
                    </tr>

                    <?php foreach ($algorithmSteps as $step): ?>
                    <tr>
                        <td><?php echo $step["text_char"]; ?></td>
                        <td><?php echo $step["text_index"]; ?></td>
                        <td><?php echo $step["key_char"]; ?></td>
                        <td><?php echo $step["shift"]; ?></td>
                        <td><?php echo $step["calculation"]; ?></td>
                        <td><?php echo $step["result_char"]; ?></td>
                    </tr>
                    <?php endforeach; ?>

                </table>
            </div>
        </div>
        <?php endif; ?>

    </div>
</div>

</html>
